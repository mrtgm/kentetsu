version: 2

builds:
  - main: .
    binary: kentetsu
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: mrtgm
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/mrtgm/kentetsu
    description: Random recipe recommender from Koh Kentetsu's YouTube channel

changelog:
  sort: asc
